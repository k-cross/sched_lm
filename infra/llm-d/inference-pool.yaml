apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llmd-gateway
  namespace: llm-d
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-simulators
  namespace: llm-d
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-sim
  template:
    metadata:
      labels:
        app: vllm-sim
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: simulator
          image: ghcr.io/llm-d/llm-d-inference-sim:latest
          args:
            - "--model=Qwen/Qwen2-0.5B"
            - "--prefill-overhead=50ms"
            - "--inter-token-latency=10ms"
            - "--zmq-endpoint=tcp://0.0.0.0:5557"
            - "--force-dummy-tokenizer"
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 5557
              name: zmq
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim
  namespace: llm-d
spec:
  selector:
    app: vllm-sim
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: zmq
      port: 5557
      targetPort: 5557
---
# Prefix-affinity route: the EPP extProc (attached via the TrafficPolicy below)
# overrides endpoint selection using ZMQ KV-cache events. This is the DEFAULT
# route -- any request to the path that does not carry an x-llmd-route header
# selecting another strategy lands here.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route-prefix-affinity
  namespace: llm-d
spec:
  parentRefs:
    - name: llmd-gateway
      namespace: llm-d
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
      backendRefs:
        - group: ""
          kind: Service
          name: vllm-sim
          port: 8000
---
# Round-robin baseline route: same Service backend, but NO EPP extProc is
# attached, so kgateway falls back to its default load balancing (round-robin)
# across the vllm-sim endpoints. Selected by the `x-llmd-route: round-robin`
# header. Because this rule matches path + header it is strictly more specific
# than the prefix-affinity path-only rule, so it wins for tagged requests while
# everything else continues to hit prefix-affinity.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route-round-robin
  namespace: llm-d
spec:
  parentRefs:
    - name: llmd-gateway
      namespace: llm-d
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - type: Exact
              name: x-llmd-route
              value: round-robin
      backendRefs:
        - group: ""
          kind: Service
          name: vllm-sim
          port: 8000
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: gaie-epp-extproc
  namespace: llm-d
spec:
  extProc:
    grpcService:
      backendRef:
        name: gaie-epp
        port: 9002
    processingMode:
      requestHeaderMode: SEND
      responseHeaderMode: SEND
      requestBodyMode: NONE
      responseBodyMode: NONE
      requestTrailerMode: SKIP
      responseTrailerMode: SKIP
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: gaie-epp-policy
  namespace: llm-d
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: llm-route-prefix-affinity
  extProc:
    extensionRef:
      name: gaie-epp-extproc
      namespace: llm-d
