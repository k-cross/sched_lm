apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llmd-gateway
  namespace: llm-d
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-simulators
  namespace: llm-d
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-sim
  template:
    metadata:
      labels:
        app: vllm-sim
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: simulator
          # RFC-0001 fork (third_party/llm-d-inference-sim, branch
          # rfc-0001-retention-directives): honors x-kv-cache-priority and exports the
          # pinned-cache metrics. Built/imported by the devenv `build-sim` script.
          image: ghcr.io/llm-d/llm-d-inference-sim:rfc0001
          imagePullPolicy: IfNotPresent
          args:
            - "--model=Qwen/Qwen2-0.5B"
            - "--prefill-overhead=50ms"
            - "--inter-token-latency=10ms"
            - "--zmq-endpoint=tcp://0.0.0.0:5557"
            - "--force-dummy-tokenizer"
            # Without the block cache the retention directives (and the pinned gauges,
            # cached_tokens, ZMQ KV events) are all no-ops.
            - "--enable-kvcache"
            # The sim defaults to a 1024-token context; session turns exceed that after
            # the first turn (the system prompt alone is ~2.5k tokens) and the sim
            # answers a streaming 200 carrying a BadRequestError payload -- silently
            # zero KV activity. Size the cache in blocks (of 16 tokens) accordingly.
            - "--max-model-len=32768"
            - "--kv-cache-size=4096"
          env:
            # The kv-cache subsystem refuses to start without the pod IP (used as the
            # KV-events publisher identity).
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 5557
              name: zmq
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim
  namespace: llm-d
spec:
  selector:
    app: vllm-sim
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: zmq
      port: 5557
      targetPort: 5557
---
# Prefix-affinity route: the EPP extProc (attached via the TrafficPolicy below)
# overrides endpoint selection using ZMQ KV-cache events. This is the DEFAULT
# route -- any request to the path that does not carry an x-llmd-route header
# selecting another strategy lands here.
#
# Why a hand-rolled GatewayExtension instead of an InferencePool backendRef:
# kgateway removed InferencePool support from the Envoy data plane in v2.2
# (moved to agentgateway), and the v2.1.x envoy-wrapper images ship x86_64
# binaries that crash under Rosetta on this ARM64 cluster. The EPP picks the
# endpoint via the x-gateway-destination-endpoint header either way.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route-prefix-affinity
  namespace: llm-d
spec:
  parentRefs:
    - name: llmd-gateway
      namespace: llm-d
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
      backendRefs:
        - group: ""
          kind: Service
          name: vllm-sim
          port: 8000
---
# Round-robin baseline route: same Service backend, but NO EPP extProc is
# attached, so kgateway falls back to its default load balancing (round-robin)
# across the vllm-sim endpoints. Selected by the `x-llmd-route: round-robin`
# header. Because this rule matches path + header it is strictly more specific
# than the prefix-affinity path-only rule, so it wins for tagged requests while
# everything else continues to hit prefix-affinity.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route-round-robin
  namespace: llm-d
spec:
  parentRefs:
    - name: llmd-gateway
      namespace: llm-d
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - type: Exact
              name: x-llmd-route
              value: round-robin
      backendRefs:
        - group: ""
          kind: Service
          name: vllm-sim
          port: 8000
---
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route-class-aware-reliability
  namespace: llm-d
spec:
  parentRefs:
    - name: llmd-gateway
      namespace: llm-d
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - type: Exact
              name: x-llmd-route
              value: class-aware-reliability
      backendRefs:
        - group: ""
          kind: Service
          name: vllm-sim
          port: 8000
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: gaie-epp-extproc
  namespace: llm-d
spec:
  extProc:
    grpcService:
      backendRef:
        name: gaie-epp
        # 9005 is the values.yaml extraServicePorts entry with appProtocol h2c
        # (same targetPort 9002); the chart's own 9002 port lacks the appProtocol
        # and Envoy would dial it with HTTP/1.1 and reset with a protocol error.
        # Pairs with --secure-serving=false on the EPP: plaintext h2c end to end.
        port: 9005
    processingMode:
      requestHeaderMode: SEND
      responseHeaderMode: SEND
      # FULL_DUPLEX_STREAMED, not NONE/BUFFERED: with NONE the EPP never schedules
      # (llm-d-router only acts on the RequestBody phase); with BUFFERED, Envoy
      # lock-steps -- it waits for a headers response before sending the body --
      # but llm-d-router's EPP (GIE v1.5 protocol) defers the headers response
      # until after body-driven scheduling, so the stream stalls into the message
      # timeout and fails open. Full-duplex removes the lock-step. Envoy requires
      # trailer mode SEND alongside it.
      requestBodyMode: FULL_DUPLEX_STREAMED
      requestTrailerMode: SEND
      responseBodyMode: NONE
      responseTrailerMode: SKIP
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: gaie-epp-policy
  namespace: llm-d
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: llm-route-prefix-affinity
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: llm-route-class-aware-reliability
  extProc:
    extensionRef:
      name: gaie-epp-extproc
      namespace: llm-d
